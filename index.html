<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Palabra Diaria</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="login">

        <h1>Palabra Diaria</h1>

        <input
            id="email"
            type="email"
            placeholder="Correo">

        <input
            id="password"
            type="password"
            placeholder="Contraseña">

        <button id="btnLogin">

            Ingresar

        </button>

        <p id="mensaje"></p>

    </div>

    <div id="app" style="display:none;">

    <h2 id="usuario"></h2>

    <h3 id="fecha"></h3>

    <hr>

    <h3>¿Cómo te fue hoy?</h3>

    <div id="resultados">

        <label><input type="radio" name="resultado" value="1"> 🟩 1 intento</label><br>
        <label><input type="radio" name="resultado" value="2"> 🟦 2 intentos</label><br>
        <label><input type="radio" name="resultado" value="3"> 🟨 3 intentos</label><br>
        <label><input type="radio" name="resultado" value="4"> 🟧 4 intentos</label><br>
        <label><input type="radio" name="resultado" value="5"> 🟥 5 intentos</label><br>
        <label><input type="radio" name="resultado" value="6"> ⬜ 6 intentos</label><br>
        <label><input type="radio" name="resultado" value="0"> ⬛ No la resolví</label>

    </div>

    <br>

    <button id="btnGuardar">

        Guardar resultado

    </button>

    <p id="resultadoGuardado"></p>

    <hr>

    <button id="btnLogout">

        Cerrar sesión

    </button>

</div>

    <script type="module" src="app.js"></script>

</body>

</html>
